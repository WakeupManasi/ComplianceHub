<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Regulatory Intelligence{% endblock %} - ComplianceHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#eef2ff', 100:'#e0e7ff', 200:'#c7d2fe', 300:'#a5b4fc', 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca', 800:'#3730a3', 900:'#312e81' },
                        accent: { 400:'#34d399', 500:'#10b981', 600:'#059669' },
                        danger: { 400:'#f87171', 500:'#ef4444', 600:'#dc2626' },
                        warn: { 400:'#fbbf24', 500:'#f59e0b', 600:'#d97706' },
                    }
                }
            }
        };
        ;(function(){ const t = localStorage.getItem('theme'); if (t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark'); })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .impact-critical { border-left: 4px solid #ef4444; }
        .impact-high { border-left: 4px solid #f59e0b; }
        .impact-medium { border-left: 4px solid #3b82f6; }
        .impact-low { border-left: 4px solid #10b981; }
        .status-bar { background: linear-gradient(90deg, #6366f1, #8b5cf6, #a855f7); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1b4b; }
        ::-webkit-scrollbar-thumb { background: #4338ca; border-radius: 3px; }
    </style>
</head>
<body class="gradient-bg min-h-screen text-gray-100">
    <!-- Top Navigation -->
    <nav class="glass sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>
                    <div>
                        <span class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">RegIntel</span>
                        <span class="text-xs text-gray-400 ml-1">by ComplianceHub</span>
                    </div>
                </div>

                <div class="hidden md:flex items-center gap-1">
                    <a href="{% url 'regulatory_intel:dashboard' %}" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition {% if request.resolver_match.url_name == 'dashboard' %}bg-white/10 text-white{% else %}text-gray-300{% endif %}">
                        <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                        Dashboard
                    </a>
                    <a href="{% url 'regulatory_intel:document_list' %}" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition {% if request.resolver_match.url_name == 'document_list' %}bg-white/10 text-white{% else %}text-gray-300{% endif %}">
                        <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Documents
                    </a>
                    <a href="{% url 'regulatory_intel:report_list' %}" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition {% if request.resolver_match.url_name == 'report_list' %}bg-white/10 text-white{% else %}text-gray-300{% endif %}">
                        <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Reports
                    </a>
                    <a href="{% url 'regulatory_intel:agent_logs' %}" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-white/10 transition {% if request.resolver_match.url_name == 'agent_logs' %}bg-white/10 text-white{% else %}text-gray-300{% endif %}">
                        <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        Agent Logs
                    </a>
                    <a href="{% url 'dashboard' %}" class="px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:bg-white/10 transition">
                        ← Main Hub
                    </a>
                </div>

                <div class="flex items-center gap-3">
                    <span class="text-xs text-gray-400">{{ request.user.username }}</span>
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-xs font-bold">
                        {{ request.user.username|first|upper }}
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Messages -->
    {% if messages %}
    <div class="max-w-7xl mx-auto px-4 mt-4">
        {% for message in messages %}
        <div class="mb-2 p-3 rounded-lg text-sm
            {% if message.tags == 'success' %}bg-emerald-500/20 text-emerald-300 border border-emerald-500/30
            {% elif message.tags == 'error' %}bg-red-500/20 text-red-300 border border-red-500/30
            {% elif message.tags == 'warning' %}bg-amber-500/20 text-amber-300 border border-amber-500/30
            {% else %}bg-blue-500/20 text-blue-300 border border-blue-500/30{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
