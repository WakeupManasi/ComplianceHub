{% extends "regulatory_intel/base.html" %}
{% block title %}Upload Document{% endblock %}
{% block content %}
<div class="mb-6"><a href="{% url 'regulatory_intel:document_list' %}" class="text-xs text-indigo-400 hover:text-indigo-300">← Back to Documents</a></div>
<h1 class="text-2xl font-bold text-white mb-6">Upload Regulatory Document</h1>

<div class="glass rounded-2xl p-8 max-w-2xl">
    <form method="post" enctype="multipart/form-data" class="space-y-5">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Document Title *</label>
            <input type="text" name="title" required class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g. RBI Master Direction on KYC 2026">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Document Type</label>
                <select name="doc_type" class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm text-gray-300 focus:outline-none">
                    {% for val, label in doc_types %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Source</label>
                <select name="source_type" class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm text-gray-300 focus:outline-none">
                    {% for val, label in source_types %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Source URL</label>
            <input type="url" name="source_url" class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="https://www.rbi.org.in/...">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Upload PDF</label>
            <input type="file" name="pdf_file" accept=".pdf" class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm text-gray-300 file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:bg-indigo-600 file:text-white">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Or Paste Text Content</label>
            <textarea name="raw_text" rows="8" class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono" placeholder="Paste the regulation text here..."></textarea>
        </div>
        <button type="submit" class="w-full px-6 py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white text-sm font-semibold shadow-lg shadow-indigo-500/25 transition-all flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            Upload & Save
        </button>
    </form>
</div>
{% endblock %}
